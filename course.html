<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Course — AI Literacy Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/b561b4e93f.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body{font-family:'Source Sans Pro',sans-serif;background:#f0f4f9;}
    .module-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;}
    .module-item:hover{background:#f0f4f9;}
    .module-item.active{background:#eef2ff;border-color:hsl(240,47%,35%);}
    .module-item.done .mod-icon{background:#f0fdf4;color:#16a34a;}
    .mod-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;background:#e8f0f8;color:hsl(240,47%,35%);}
    .lesson-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .15s;margin-left:8px;border-left:2px solid #e2eaf4;}
    .lesson-item:hover{background:#f8fafc;}
    .lesson-item.active{border-left-color:hsl(24,67%,51%);background:#fff9f5;}
    .lesson-item.done{border-left-color:#16a34a;}
    .prog-bar{height:8px;border-radius:999px;background:#e2eaf4;}
    .prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,hsl(240,47%,35%),hsl(24,67%,51%));transition:width .6s ease;}
    .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
    .embed-container{position:relative;width:100%;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;}
    .embed-container iframe,.embed-container video{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
    /* Quiz styles */
    .quiz-option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #e2eaf4;border-radius:12px;cursor:pointer;transition:all .15s;background:#fff;}
    .quiz-option:hover{border-color:hsl(240,47%,35%);background:#f8fafc;}
    .quiz-option.selected{border-color:hsl(240,47%,35%);background:#eef2ff;}
    .quiz-option.correct{border-color:#16a34a;background:#f0fdf4;}
    .quiz-option.wrong{border-color:#dc2626;background:#fef2f2;}
    .quiz-option.reveal-correct{border-color:#16a34a;background:#f0fdf4;}
    .option-circle{width:24px;height:24px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px;}
    .quiz-option.selected .option-circle{border-color:hsl(240,47%,35%);background:hsl(240,47%,35%);color:#fff;}
    .quiz-option.correct .option-circle{border-color:#16a34a;background:#16a34a;color:#fff;}
    .quiz-option.wrong .option-circle{border-color:#dc2626;background:#dc2626;color:#fff;}
    .quiz-option.reveal-correct .option-circle{border-color:#16a34a;background:#16a34a;color:#fff;}
  </style>
</head>
<body>
<header class="sticky top-0 z-30 bg-white border-b border-gray-100 px-5 py-3 flex items-center gap-3">
  <a href="dashboard.html" class="flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-gray-800"><i class="fa fa-arrow-left"></i> Dashboard</a>
  <div class="w-px h-5 bg-gray-200 mx-1"></div>
  <h1 id="course-title" class="font-heading font-bold text-gray-900 text-base truncate flex-1">Loading...</h1>
  <button id="enroll-btn" class="px-4 py-2 rounded-xl text-sm font-semibold text-white hidden" style="background:hsl(240,47%,35%);">Enroll Now</button>
</header>

<div class="max-w-7xl mx-auto px-4 py-5 flex flex-col lg:flex-row gap-5">
  <!-- Left: video + info + quiz -->
  <div class="flex-1 min-w-0 space-y-4">
    <div class="card p-4">
      <div id="video-wrap" class="embed-container">
        <div class="absolute inset-0 flex flex-col items-center justify-center text-white" style="background:#0f172a;border-radius:12px;">
          <i class="fa fa-play-circle text-5xl mb-3 opacity-60"></i>
          <p class="text-sm opacity-50">Select a module to start watching</p>
        </div>
      </div>
      <h2 id="now-playing" class="font-heading font-semibold text-gray-900 mt-4 text-lg">Select a module</h2>
      <p id="module-desc" class="text-sm text-gray-500 mt-1"></p>
      <div class="mt-4 flex items-center gap-3 flex-wrap">
        <button id="mark-done-btn" class="hidden px-5 py-2.5 rounded-xl text-sm font-semibold text-white" style="background:hsl(240,47%,35%);">
          <i class="fa fa-check mr-1.5"></i> Mark as Complete
        </button>
        <span id="already-done-tag" class="hidden items-center gap-1.5 text-sm font-semibold text-green-600">
          <i class="fa fa-check-circle"></i> Completed
        </span>
        <p id="mark-done-hint" class="hidden text-xs text-amber-600 font-medium"></p>
      </div>
    </div>
    <!-- Course Quiz section (shown after all modules complete) -->
    <div id="quiz-section" class="card p-5 hidden">
      <div id="quiz-locked" class="text-center py-6 hidden">
        <div class="text-3xl mb-2">🔒</div>
        <p class="text-sm text-gray-500">Complete all course modules to unlock the quiz</p>
      </div>
      <div id="quiz-content" class="hidden">
        <div class="flex items-center justify-between mb-4">
          <h3 id="quiz-title" class="font-heading font-bold text-gray-900 text-lg"></h3>
          <span id="quiz-passing-badge" class="text-xs font-semibold px-3 py-1 rounded-full" style="background:#e8f0f8;color:hsl(240,47%,35%);"></span>
        </div>
        <div id="quiz-status-bar" class="mb-4 hidden p-3 rounded-xl text-sm font-semibold text-center"></div>
        <div id="quiz-questions" class="space-y-6"></div>
        <div class="mt-6 flex items-center gap-3 flex-wrap">
          <button id="quiz-submit-btn" class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white" style="background:hsl(240,47%,35%);">Submit Quiz</button>
          <button id="quiz-retake-btn" class="hidden px-6 py-2.5 rounded-xl text-sm font-semibold border border-gray-200 text-gray-700 hover:bg-gray-50">Retake Quiz</button>
          <button id="quiz-email-btn" class="hidden px-5 py-2.5 rounded-xl text-sm font-semibold border text-gray-700 hover:bg-gray-50" style="border-color:#e2eaf4;"><i class="fa fa-envelope mr-1.5"></i> Email My Score</button>
        </div>
      </div>
    </div>

    <!-- Module text quiz panel (shown inline when user opens a quiz) -->
    <div id="module-quiz-panel" class="card p-5 hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 id="module-quiz-title" class="font-heading font-semibold text-gray-900 text-base"></h3>
        <button id="module-quiz-close-btn" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>
      <div id="module-quiz-questions" class="space-y-4 mb-4"></div>
      <div class="flex gap-3">
        <button id="module-quiz-submit-btn" class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white" style="background:hsl(240,47%,35%);">Submit Answers</button>
      </div>
    </div>
    <div class="card p-5">
      <h3 class="font-heading font-semibold text-gray-900 mb-1">About this Course</h3>
      <p id="course-desc" class="text-sm text-gray-600 leading-relaxed"></p>
    </div>
  </div>

  <!-- Right: progress + module list -->
  <div class="w-full lg:w-80 flex-shrink-0 space-y-4">
    <div class="card p-4">
      <div class="flex justify-between text-sm mb-2">
        <span class="font-medium text-gray-700">Your Progress</span>
        <span id="prog-pct" class="font-semibold" style="color:hsl(240,47%,35%);">0%</span>
      </div>
      <div class="prog-bar"><div id="prog-fill" class="prog-fill" style="width:0%"></div></div>
      <div id="prog-label" class="text-xs text-gray-400 mt-1.5">0 of 0 modules completed</div>
      <div id="cert-wrap" class="mt-3 hidden space-y-2">
        <button id="cert-request-btn" class="w-full py-2.5 rounded-xl text-sm font-semibold text-white" style="background:hsl(24,67%,51%);">🎓 Request Certificate</button>
        <p id="cert-status-msg" class="text-xs text-center text-gray-500 hidden"></p>
        <div id="cert-download-wrap" class="hidden flex gap-2">
          <button id="cert-download-btn" class="flex-1 py-2 rounded-xl text-sm font-semibold text-white" style="background:hsl(240,47%,35%);">⬇ Download PDF</button>
          <button id="cert-email-btn" class="flex-1 py-2 rounded-xl text-sm font-semibold border border-gray-200 text-gray-700 hover:bg-gray-50">✉ Email Me</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="px-4 py-3 border-b border-gray-100">
        <h3 class="font-heading font-semibold text-gray-900 text-sm">Course Content</h3>
      </div>
      <div id="module-list" class="p-3 space-y-1.5 max-h-[65vh] overflow-y-auto">
        <div class="text-center py-6 text-gray-400 text-sm">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script src="static/js/nav.js"></script>
<script src="static/js/course.js"></script>
</body>
</html>
